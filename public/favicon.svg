<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%">
  <!-- Receipt Body -->
  <path 
    d="M 4 5 
       Q 5.5 3, 7 5 
       Q 8.5 3, 10 5 
       Q 11.5 3, 13 5 
       Q 14.5 3, 16 5 
       Q 17.5 3, 19 5 
       L 19 14 
       C 19 14, 15 14, 14 15 
       C 13 16, 12 18, 12 20 
       L 4 20 Z" 
    fill="none" 
    stroke="black" 
    stroke-width="2" 
    stroke-linejoin="round" 
    stroke-linecap="round"
  />

  <!-- Text Lines on Receipt -->
  <path 
    d="M 7 8 H 16 
       M 7 11 H 13 
       M 7 14 H 10" 
    fill="none" 
    stroke="black" 
    stroke-width="2" 
    stroke-linecap="round"
  />

  <!-- Add Badge (Circle & Plus) -->
  <g>
    <!-- Background Circle -->
    <circle cx="17" cy="17" r="5" fill="black" />
    <!-- White Plus Sign -->
    <path 
      d="M 14.5 17 H 19.5 M 17 14.5 V 19.5" 
      fill="none" 
      stroke="white" 
      stroke-width="1.5" 
      stroke-linecap="round"
    />
  </g>
</svg>
